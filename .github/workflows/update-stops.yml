name: Update stop data

on:
  schedule:
    - cron: '17 4 1 * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: monthly-osm-data-refresh
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          ref: ${{ github.event.repository.default_branch }}

      - name: Setup Node
        uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Refresh stop data
        run: npm run update:stops

      - name: Check formatting
        run: npm run format:check

      - name: Build
        run: npm run build

      - name: Commit updated stop data
        run: |
          git add public/data/osm-stops.json
          if git diff --cached --quiet; then
            echo "Stop data is already up to date."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "Update OSM stop data"
          git push origin "HEAD:${{ github.event.repository.default_branch }}"
