name: Update stop data

on:
  schedule:
    - cron: '17 4 1 * *'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: update-stop-data
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Refresh stop data
        run: npm run update:stops

      - name: Check formatting
        run: npm run format:check

      - name: Build
        run: npm run build

      - name: Create pull request
        uses: peter-evans/create-pull-request@v7
        with:
          branch: automation/update-stop-data
          delete-branch: true
          commit-message: 'Update OSM stop data'
          title: 'Update OSM stop data'
          body: |
            Monthly refresh of the OSM stop snapshot generated by `npm run update:stops`.

            The workflow verified the refreshed snapshot with `npm run format:check` and `npm run build`.
          labels: data
